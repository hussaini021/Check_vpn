<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VPN Guard Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  background: #0f172a;
  color: #e5e7eb;
  font-family: monospace;
  padding: 20px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

pre {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
  min-height: 220px;
}
</style>
</head>

<body>

<h2>🔐 VPN Guard Pro</h2>

<button onclick="startAnalysis()">Start Full VPN Analysis</button>

<pre id="output">Ready</pre>

<script>
const API = window.location.origin;

function startAnalysis() {
  document.getElementById("output").innerText =
    "Running analysis...\nPlease wait ⏳";

  fetch(API + "/analyze")
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").innerText =
        data.output || "No output";
    })
    .catch(() => {
      document.getElementById("output").innerText =
        "Connection error ❌";
    });
}
</script>

</body>
</html>
