<button onclick="start()">Start Full VPN Analysis</button>
<pre id="output">Idle</pre>

<script>
const API = window.location.origin;

function start() {
  fetch(API + "/start")
    .then(() => poll());
}

function poll() {
  fetch(API + "/result")
    .then(r => r.json())
    .then(data => {
      document.getElementById("output").innerText =
        data.status + "\n\n" + data.output;

      if (data.status === "running") {
        setTimeout(poll, 2000);
      }
    });
}
</script><body>

<h2>🔐 VPN Guard Pro</h2>

<button onclick="startAnalysis()">Start Full VPN Analysis</button>

<pre id="output">Ready</pre>

<script>
const API = window.location.origin;

function startAnalysis() {
  document.getElementById("output").innerText =
    "Running analysis...\nPlease wait ⏳";

  fetch(API + "/analyze")
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").innerText =
        data.output || "No output";
    })
    .catch(() => {
      document.getElementById("output").innerText =
        "Connection error ❌";
    });
}
</script>

</body>
</html>
