<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VPN Guard Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
button {
  width:90%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
  background:#22c55e;
}
pre {
  background:#020617;
  padding:15px;
  border-radius:10px;
  text-align:left;
}
</style>
</head>
<body>

<h2>🔐 VPN Guard Pro</h2>

<button onclick="checkIP()">Check IP</button>
<button onclick="analyze()">Start Analysis</button>

<pre id="out">Ready</pre>

<script>
const API = "";

function checkIP(){
  fetch(API + "/check-ip")
  .then(r=>r.json())
  .then(d=>{
    out.innerText = "Country: " + d.country + "\nISP: " + d.isp;
  });
}

function analyze(){
  fetch(API + "/analyze")
  .then(r=>r.json())
  .then(d=>{
    out.innerText = d.status + "\nCountry: " + d.country + "\nISP: " + d.isp;
  });
}
</script>

</body>
</html>
